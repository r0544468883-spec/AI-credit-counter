<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 360px; min-height: 420px; background: #0b1120; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; }
    .header { padding: 16px; border-bottom: 1px solid #1e293b; display: flex; align-items: center; gap: 10px; }
    .header h1 { font-size: 16px; font-weight: 700; background: linear-gradient(135deg, #facc15, #eab308); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header small { display: block; font-size: 9px; color: #64748b; letter-spacing: 2px; text-transform: uppercase; }
    .content { padding: 12px; }
    .platform { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 10px; margin-bottom: 8px; background: #131b2e; border: 1px solid #1e293b; }
    .platform-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; }
    .platform-info { flex: 1; }
    .platform-name { font-size: 13px; font-weight: 600; }
    .platform-meta { font-size: 10px; color: #64748b; }
    .platform-remaining { text-align: right; font-size: 16px; font-weight: 700; }
    .platform-remaining small { display: block; font-size: 9px; color: #64748b; }
    .progress-bar { width: 100%; height: 4px; background: #1e293b; border-radius: 4px; margin-top: 6px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
    .green { background: #22c55e; }
    .yellow { background: #eab308; }
    .red { background: #ef4444; }
    .tip { margin: 12px 0; padding: 12px; border-radius: 10px; background: linear-gradient(135deg, #facc1508, transparent); border: 1px solid #facc1520; }
    .tip-label { font-size: 10px; font-weight: 600; color: #facc15; margin-bottom: 4px; }
    .tip-text { font-size: 12px; color: #94a3b8; line-height: 1.4; }
    .footer { padding: 12px; border-top: 1px solid #1e293b; text-align: center; }
    .footer a { color: #facc15; text-decoration: none; font-size: 12px; font-weight: 600; }
    .footer a:hover { text-decoration: underline; }
    #loading { text-align: center; padding: 40px; color: #64748b; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>AI-Flow Monitor</h1>
      <small>Credit Tracker</small>
    </div>
  </div>
  <div class="content" id="app">
    <div id="loading">Loading platforms...</div>
  </div>
  <div class="footer">
    <a href="#" id="open-dashboard">Open Dashboard →</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
